services:
  postgres:
    image: postgres:15-alpine
    container_name: ${DB_NAME}-db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_ADMIN}
      POSTGRES_PASSWORD: ${DB_ADMIN_PASS}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  api:
    build:
      context: .
      args:
        KB_API_PORT: ${KB_API_PORT}
    container_name: ${DB_NAME}-api
    environment:
      DATABASE_URL: postgresql://${DB_ADMIN}:${DB_ADMIN_PASS}@postgres:5432/${DB_NAME}
      KB_API_PORT: ${KB_API_PORT}
    ports:
      - "${KB_API_PORT}:${KB_API_PORT}"
    depends_on:
      - postgres
    command: uvicorn kbapi:app --host 0.0.0.0 --port ${KB_API_PORT}
    restart: unless-stopped

volumes:
  postgres_data:
